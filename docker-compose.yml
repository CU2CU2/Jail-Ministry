version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: jail_ministry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jail_ministry
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jail_ministry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
