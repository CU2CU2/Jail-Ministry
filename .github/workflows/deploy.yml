name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: https://jail-ministry.azurewebsites.net
          AUTH_URL: https://jail-ministry.azurewebsites.net
          AUTH_TRUST_HOST: 'true'
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Package standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Prisma engine binaries are not auto-included in standalone output
          cp -r node_modules/.prisma .next/standalone/node_modules/.prisma
          cp -r node_modules/@prisma/client .next/standalone/node_modules/@prisma/client
          cd .next/standalone
          zip -r ../../deploy.zip .

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group rg-jail-ministry \
            --name jail-ministry \
            --src-path deploy.zip \
            --type zip \
            --async false

      - name: Set startup command
        run: |
          az webapp config set \
            --resource-group rg-jail-ministry \
            --name jail-ministry \
            --startup-file "node server.js"
